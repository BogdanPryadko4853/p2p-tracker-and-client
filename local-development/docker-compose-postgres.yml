services:
  postgres:
    image: postgres:17-alpine
    container_name: p2p-tracker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracker_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_p2p:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data_p2p:
    name: postgres_data_p2p